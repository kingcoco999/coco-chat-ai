<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e8e4e0"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#555"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Chat bubble -->
  <g transform="translate(256,240)">
    <!-- Main bubble -->
    <ellipse cx="0" cy="0" rx="140" ry="120" fill="#fff" stroke="#e0e0e0" stroke-width="3"/>
    <!-- Tail -->
    <path d="M-60,100 Q-40,140 20,110 Q-20,130 -50,105 Z" fill="#fff" stroke="#e0e0e0" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="-45" cy="-15" r="12" fill="#2c2c2c"/>
    <circle cx="45" cy="-15" r="12" fill="#2c2c2c"/>
    <!-- Eye shine -->
    <circle cx="-40" cy="-20" r="4" fill="#fff"/>
    <circle cx="50" cy="-20" r="4" fill="#fff"/>
    <!-- Mouth -->
    <path d="M-20,30 Q0,50 20,30" fill="none" stroke="#2c2c2c" stroke-width="4" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-70" cy="20" rx="20" ry="10" fill="rgba(0,0,0,0.06)"/>
    <ellipse cx="70" cy="20" rx="20" ry="10" fill="rgba(0,0,0,0.06)"/>
  </g>
  <!-- Sparkle -->
  <g transform="translate(380,120)">
    <path d="M0,-20 L5,-5 L20,0 L5,5 L0,20 L-5,5 L-20,0 L-5,-5 Z" fill="#c8b890" opacity="0.8"/>
  </g>
  <!-- Small heart -->
  <g transform="translate(130,380)">
    <path d="M0,-8 C-8,-18 -20,-8 -12,2 L0,14 L12,2 C20,-8 8,-18 0,-8 Z" fill="#9bb5c4" opacity="0.6"/>
  </g>
</svg>
